apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-demo-app-rollout-prod
  namespace: tssc-gitops
  finalizers: ["resources-finalizer.argocd.argoproj.io"]
spec:
  project: default
  source:
    path: ./components/ai-demo-app/overlays/prod
    repoURL: https://github.com/pipelines-as-code/ai-demo-app-gitops
    targetRevision: rollout
  destination:
    namespace: ai-demo-app-rollout-prod
    server: https://kubernetes.default.svc
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: tssc-gitops
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: -1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
